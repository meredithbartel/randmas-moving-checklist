<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Moving Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --green: #22c55e;
            --green-bg: #f0fdf4;
            --orange: #f59e0b;
            --orange-bg: #fffbeb;
            --red: #ef4444;
            --red-bg: #fef2f2;
            --purple: #a855f7;
            --purple-bg: #faf5ff;
            --gray: #94a3b8;
            --blue: #3b82f6;
            --blue-bg: #eff6ff;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            color: white;
            padding: 28px 20px 20px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -60%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        header p {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 400;
        }
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }
        .sync-dot.offline { background: #fbbf24; }
        .sync-dot.error { background: #f87171; }

        /* Progress Section */
        .progress-section {
            max-width: 800px;
            margin: -16px auto 0;
            padding: 0 16px;
            position: relative;
            z-index: 2;
        }
        .progress-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-md);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }
        .progress-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .progress-pct {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-stats {
            display: flex;
            gap: 16px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .mini-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .mini-stat-icon {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* Room Navigation - Horizontal pills on mobile */
        .room-nav {
            max-width: 800px;
            margin: 16px auto 0;
            padding: 0 16px;
        }
        .room-pills {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .room-pills::-webkit-scrollbar { display: none; }

        .room-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .room-pill:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .room-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .room-pill .pill-count {
            font-size: 0.75rem;
            padding: 1px 7px;
            border-radius: 10px;
            background: rgba(0,0,0,0.08);
            font-weight: 600;
        }
        .room-pill.active .pill-count {
            background: rgba(255,255,255,0.25);
        }

        /* Filter Bar */
        .filter-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px 8px;
        }
        .filter-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-right: 4px;
        }
        .filter-chip {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .filter-chip:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-chip.active {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 8px 16px 32px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .room-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }
        .room-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Checklist Items */
        .checklist { list-style: none; }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: default;
        }
        .checklist-item:hover {
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }
        .checklist-item.done {
            background: #f8fafc;
            border-color: #e2e8f0;
        }
        .checklist-item.done .item-text { opacity: 0.5; }
        .checklist-item.done .item-name {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        /* Custom Checkbox */
        .custom-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            margin-top: 1px;
        }
        .custom-check:hover { border-color: var(--primary); }
        .custom-check.checked {
            background: var(--green);
            border-color: var(--green);
        }
        .custom-check.checked::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translateY(-1px);
        }

        .item-body {
            flex: 1;
            min-width: 0;
        }
        .item-name {
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-word;
        }
        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }
        .item-notes {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-style: italic;
        }

        /* Tags */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .tag-who { background: var(--blue-bg); color: var(--blue); }
        .tag-garage { background: var(--orange-bg); color: #d97706; }
        .tag-sell { background: var(--red-bg); color: var(--red); }
        .tag-give { background: var(--purple-bg); color: var(--purple); }
        .tag-trash { background: #f1f5f9; color: #475569; }

        /* Item Actions */
        .item-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .checklist-item:hover .item-actions { opacity: 1; }

        .action-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .action-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .action-btn.delete:hover { background: var(--red-bg); border-color: #fecaca; color: var(--red); }

        /* Add Item Section */
        .add-section {
            margin-top: 16px;
        }
        .add-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-secondary);
            width: 100%;
            transition: all 0.2s;
        }
        .add-toggle:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--primary-bg);
        }
        .add-toggle .plus-icon {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: var(--primary-bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .add-form {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-md);
            animation: slideDown 0.2s ease;
        }
        .add-form.open { display: block; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-grid .full-width { grid-column: 1 / -1; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input[type="text"] {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: all 0.15s;
        }
        .input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            background: var(--card);
        }

        .tag-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .tag-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.15s;
            user-select: none;
        }
        .tag-option:hover { border-color: #cbd5e1; }
        .tag-option input { display: none; }
        .tag-option.selected-garage { background: var(--orange-bg); border-color: #fcd34d; color: #d97706; }
        .tag-option.selected-sell { background: var(--red-bg); border-color: #fca5a5; color: var(--red); }
        .tag-option.selected-give { background: var(--purple-bg); border-color: #d8b4fe; color: var(--purple); }
        .tag-option.selected-trash { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }

        .form-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-secondary);
        }
        .btn-secondary:hover { background: #e2e8f0; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            justify-content: center;
            align-items: flex-end;
            padding: 16px;
        }
        .modal-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card);
            border-radius: 20px 20px 16px 16px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (min-width: 640px) {
            .modal-overlay { align-items: center; }
            .modal { border-radius: 20px; }
        }

        @media (max-width: 480px) {
            header { padding: 20px 16px 16px; }
            header h1 { font-size: 1.4rem; }
            .progress-card { padding: 16px; }
            .progress-pct { font-size: 1.25rem; }
            .form-grid { grid-template-columns: 1fr; }
            .checklist-item { padding: 12px; }
            .item-actions { opacity: 1; }
            .room-pill { padding: 7px 12px; font-size: 0.8rem; }
        }

        /* Print */
        @media print {
            header, .room-nav, .filter-section, .add-section, .item-actions, .sync-status, .progress-section { display: none !important; }
            .main-content { display: block !important; }
            .checklist-item { box-shadow: none; border: 1px solid #ddd; }
        }

        /* Loading spinner */
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Drag handle hint */
        .drag-handle {
            color: #cbd5e1;
            cursor: grab;
            font-size: 1rem;
            line-height: 1;
            user-select: none;
            padding: 2px;
        }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
    <div class="header-content">
        <h1>Mom's Moving Checklist</h1>
        <p>Room by room &mdash; everyone stays in sync</p>
        <div class="sync-status">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Checking connection...</span>
        </div>
    </div>
</header>

<div class="progress-section">
    <div class="progress-card">
        <div class="progress-header">
            <span class="progress-title">Overall Progress</span>
            <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-stats" id="progressStats"></div>
    </div>
</div>

<div class="room-nav">
    <div class="room-pills" id="roomPills"></div>
</div>

<div class="filter-section">
    <div class="filter-row">
        <span class="filter-label">Filter:</span>
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="pending">To Do</button>
        <button class="filter-chip" data-filter="done">Done</button>
        <button class="filter-chip" data-filter="garage">Garage</button>
        <button class="filter-chip" data-filter="sell">Sell</button>
        <button class="filter-chip" data-filter="give">Give Away</button>
        <button class="filter-chip" data-filter="trash">Trash</button>
        <button class="filter-chip" data-filter="unassigned">No One Assigned</button>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="loading"><div class="spinner"></div></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3 class="modal-title">Edit Item</h3>
        <div class="form-grid">
            <div class="input-group full-width">
                <label>Item Name</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label>Assigned To</label>
                <input type="text" id="editWho" placeholder="e.g. Greg, Mom, Scott">
            </div>
            <div class="input-group">
                <label>Notes</label>
                <input type="text" id="editNotes" placeholder="Optional">
            </div>
            <div class="input-group full-width">
                <label>Category</label>
                <div class="tag-options" id="editTags">
                    <label class="tag-option" data-tag="garage">
                        <input type="checkbox" id="editGarage"> Garage
                    </label>
                    <label class="tag-option" data-tag="sell">
                        <input type="checkbox" id="editSell"> Sell
                    </label>
                    <label class="tag-option" data-tag="give">
                        <input type="checkbox" id="editGive"> Give Away
                    </label>
                    <label class="tag-option" data-tag="trash">
                        <input type="checkbox" id="editTrash"> Trash
                    </label>
                </div>
            </div>
        </div>
        <div class="form-buttons">
            <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

// ==================== ROOMS & DEFAULT DATA ====================

// ==================== STATE ====================
let data = {};
let activeRoom = ROOMS[0];
let activeFilter = "all";
let editingItem = null;
let db = null;
let dbRef = null;

// ==================== FIREBASE ====================
function initFirebase() {
    if (!USE_FIREBASE) {
        setSyncStatus("offline", "Local only (no Firebase)");
        return;
    }
    try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
        dbRef = db.ref("checklist");

        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                setSyncStatus("online", "Synced in real-time");
            } else {
                setSyncStatus("offline", "Offline - changes saved locally");
            }
        });

        // Listen for real-time updates
        dbRef.on("value", (snapshot) => {
            const val = snapshot.val();
            if (val) {
                data = {};
                for (const room of ROOMS) {
                    data[room] = val[room] ? Object.values(val[room]) : [];
                }
                localStorage.setItem("movingChecklist", JSON.stringify(data));
                refreshUI();
            }
        });
    } catch (e) {
        console.error("Firebase init failed:", e);
        setSyncStatus("error", "Sync error - using local data");
    }
}

function setSyncStatus(status, text) {
    const dot = document.getElementById("syncDot");
    const label = document.getElementById("syncText");
    dot.className = "sync-dot " + status;
    label.textContent = text;
}

// ==================== DATA LAYER ====================
function loadData() {
    const saved = localStorage.getItem("movingChecklist");
    if (saved) {
        data = JSON.parse(saved);
        for (const room of ROOMS) {
            if (!data[room]) data[room] = [];
        }
    } else {
        for (const room of ROOMS) {
            data[room] = DEFAULT_DATA[room] ? DEFAULT_DATA[room].map(i => ({...i})) : [];
        }
        saveData(true);
    }
}

function saveData(quiet) {
    localStorage.setItem("movingChecklist", JSON.stringify(data));
    if (USE_FIREBASE && dbRef) {
        const fbData = {};
        for (const room of ROOMS) {
            fbData[room] = data[room] || [];
        }
        dbRef.set(fbData);
    }
    if (!quiet) showToast("Changes saved");
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove("show"), 2000);
}

// ==================== RENDER ====================
function renderRoomPills() {
    const c = document.getElementById("roomPills");
    c.innerHTML = "";
    for (const room of ROOMS) {
        const items = data[room] || [];
        const done = items.filter(i => i.done).length;
        const total = items.length;
        const pill = document.createElement("button");
        pill.className = "room-pill" + (room === activeRoom ? " active" : "");
        pill.innerHTML = `${esc(room)}` + (total > 0 ? ` <span class="pill-count">${done}/${total}</span>` : "");
        pill.onclick = () => { activeRoom = room; refreshUI(); };
        c.appendChild(pill);
    }
}

function renderMainContent() {
    const c = document.getElementById("mainContent");
    const items = data[activeRoom] || [];
    const filtered = items.map((item, i) => ({item, i})).filter(({item}) => matchesFilter(item));

    let html = `<div class="room-header">
        <h2 class="room-title">${esc(activeRoom)}</h2>
        <span class="room-count">${filtered.length} item${filtered.length !== 1 ? 's' : ''}</span>
    </div>`;

    if (filtered.length === 0 && items.length === 0) {
        html += `<div class="empty-state">
            <div class="empty-icon">&#128230;</div>
            <p>No items in this room yet.<br>Add one below!</p>
        </div>`;
    } else if (filtered.length === 0) {
        html += `<div class="empty-state">
            <div class="empty-icon">&#128269;</div>
            <p>No items match this filter.</p>
        </div>`;
    }

    html += `<ul class="checklist">`;
    for (const {item, i} of filtered) {
        html += renderItem(activeRoom, i, item);
    }
    html += `</ul>`;

    // Add form
    const rid = slugify(activeRoom);
    html += `
    <div class="add-section">
        <button class="add-toggle" onclick="toggleAddForm('${rid}')" id="addToggle-${rid}">
            <span class="plus-icon">+</span> Add new item to ${esc(activeRoom)}
        </button>
        <div class="add-form" id="addForm-${rid}">
            <div class="form-title">New Item</div>
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>What needs to be done?</label>
                    <input type="text" id="addName-${rid}" placeholder="e.g. Pack dishes">
                </div>
                <div class="input-group">
                    <label>Assigned To</label>
                    <input type="text" id="addWho-${rid}" placeholder="e.g. Greg">
                </div>
                <div class="input-group">
                    <label>Notes</label>
                    <input type="text" id="addNotes-${rid}" placeholder="Optional">
                </div>
                <div class="input-group full-width">
                    <label>Category</label>
                    <div class="tag-options">
                        <label class="tag-option" data-tag="garage" onclick="toggleTag(this)">
                            <input type="checkbox" id="addGarage-${rid}"> Garage
                        </label>
                        <label class="tag-option" data-tag="sell" onclick="toggleTag(this)">
                            <input type="checkbox" id="addSell-${rid}"> Sell
                        </label>
                        <label class="tag-option" data-tag="give" onclick="toggleTag(this)">
                            <input type="checkbox" id="addGive-${rid}"> Give Away
                        </label>
                        <label class="tag-option" data-tag="trash" onclick="toggleTag(this)">
                            <input type="checkbox" id="addTrash-${rid}"> Trash
                        </label>
                    </div>
                </div>
            </div>
            <div class="form-buttons">
                <button class="btn btn-primary" onclick="addItem('${escAttr(activeRoom)}')">Add Item</button>
                <button class="btn btn-secondary" onclick="toggleAddForm('${rid}')">Cancel</button>
            </div>
        </div>
    </div>`;

    c.innerHTML = html;
}

function renderItem(room, index, item) {
    let tags = "";
    if (item.who) tags += `<span class="tag tag-who">${esc(item.who)}</span>`;
    if (item.garage) tags += `<span class="tag tag-garage">Garage</span>`;
    if (item.sell) tags += `<span class="tag tag-sell">Sell</span>`;
    if (item.give) tags += `<span class="tag tag-give">Give Away</span>`;
    if (item.trash) tags += `<span class="tag tag-trash">Trash</span>`;

    const notes = item.notes ? `<div class="item-notes">${esc(item.notes)}</div>` : "";

    return `
    <li class="checklist-item ${item.done ? 'done' : ''}">
        <div class="custom-check ${item.done ? 'checked' : ''}" onclick="toggleDone('${escAttr(room)}', ${index})"></div>
        <div class="item-body">
            <div class="item-name">${esc(item.name)}</div>
            ${tags ? `<div class="item-meta">${tags}</div>` : ''}
            ${notes}
        </div>
        <div class="item-actions">
            <button class="action-btn" onclick="openEdit('${escAttr(room)}', ${index})" title="Edit">&#9998;</button>
            <button class="action-btn delete" onclick="deleteItem('${escAttr(room)}', ${index})" title="Remove">&times;</button>
        </div>
    </li>`;
}

function updateProgress() {
    let total = 0, done = 0, garage = 0, sell = 0, give = 0, trash = 0;
    for (const room of ROOMS) {
        for (const item of data[room] || []) {
            total++;
            if (item.done) done++;
            if (item.garage) garage++;
            if (item.sell) sell++;
            if (item.give) give++;
            if (item.trash) trash++;
        }
    }
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById("progressPct").textContent = pct + "%";
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressStats").innerHTML = `
        <span class="mini-stat"><span class="mini-stat-icon" style="background:var(--green-bg);color:var(--green);">&#10003;</span> ${done} done</span>
        <span class="mini-stat"><span class="mini-stat-icon" style="background:#f1f5f9;color:#64748b;">&#9744;</span> ${total - done} left</span>
        <span class="mini-stat"><span class="mini-stat-icon" style="background:var(--orange-bg);color:#d97706;">G</span> ${garage}</span>
        <span class="mini-stat"><span class="mini-stat-icon" style="background:var(--red-bg);color:var(--red);">S</span> ${sell}</span>
        <span class="mini-stat"><span class="mini-stat-icon" style="background:var(--purple-bg);color:var(--purple);">&#9829;</span> ${give}</span>
        <span class="mini-stat"><span class="mini-stat-icon" style="background:#f1f5f9;color:#475569;">T</span> ${trash}</span>
    `;
}

function refreshUI() {
    renderRoomPills();
    renderMainContent();
    updateProgress();
}

// ==================== FILTERS ====================
function matchesFilter(item) {
    switch (activeFilter) {
        case "all": return true;
        case "pending": return !item.done;
        case "done": return item.done;
        case "garage": return item.garage;
        case "sell": return item.sell;
        case "give": return item.give;
        case "trash": return item.trash;
        case "unassigned": return !item.who;
        default: return true;
    }
}

function setupFilters() {
    document.querySelectorAll(".filter-chip").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeFilter = btn.dataset.filter;
            renderMainContent();
        };
    });
}

// ==================== ACTIONS ====================
function toggleDone(room, index) {
    data[room][index].done = !data[room][index].done;
    saveData();
    refreshUI();
}

function toggleAddForm(rid) {
    const form = document.getElementById("addForm-" + rid);
    const toggle = document.getElementById("addToggle-" + rid);
    const isOpen = form.classList.contains("open");
    form.classList.toggle("open");
    toggle.style.display = isOpen ? "" : "none";
    if (!isOpen) {
        const nameInput = document.getElementById("addName-" + rid);
        if (nameInput) nameInput.focus();
    }
}

function toggleTag(el) {
    const cb = el.querySelector("input");
    const tag = el.dataset.tag;
    // Toggle happens automatically from label click
    setTimeout(() => {
        if (cb.checked) {
            el.classList.add("selected-" + tag);
        } else {
            el.classList.remove("selected-" + tag);
        }
    }, 0);
}

function addItem(room) {
    const rid = slugify(room);
    const nameEl = document.getElementById("addName-" + rid);
    const name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }

    data[room].push({
        name,
        who: document.getElementById("addWho-" + rid).value.trim(),
        garage: document.getElementById("addGarage-" + rid).checked,
        sell: document.getElementById("addSell-" + rid).checked,
        give: document.getElementById("addGive-" + rid).checked,
        trash: document.getElementById("addTrash-" + rid).checked,
        done: false,
        notes: document.getElementById("addNotes-" + rid).value.trim(),
    });
    saveData();
    refreshUI();
}

function deleteItem(room, index) {
    const name = data[room][index].name;
    if (!confirm(`Remove "${name}"?`)) return;
    data[room].splice(index, 1);
    saveData();
    refreshUI();
}

function openEdit(room, index) {
    editingItem = { room, index };
    const item = data[room][index];
    document.getElementById("editName").value = item.name;
    document.getElementById("editWho").value = item.who || "";
    document.getElementById("editNotes").value = item.notes || "";
    document.getElementById("editGarage").checked = item.garage;
    document.getElementById("editSell").checked = item.sell;
    document.getElementById("editGive").checked = item.give;
    document.getElementById("editTrash").checked = item.trash;

    // Update tag option visual states
    document.querySelectorAll("#editTags .tag-option").forEach(el => {
        const tag = el.dataset.tag;
        const cb = el.querySelector("input");
        el.classList.toggle("selected-" + tag, cb.checked);
    });

    document.getElementById("editModal").classList.add("open");
}

function saveEdit() {
    if (!editingItem) return;
    const { room, index } = editingItem;
    const item = data[room][index];
    item.name = document.getElementById("editName").value.trim() || item.name;
    item.who = document.getElementById("editWho").value.trim();
    item.notes = document.getElementById("editNotes").value.trim();
    item.garage = document.getElementById("editGarage").checked;
    item.sell = document.getElementById("editSell").checked;
    item.give = document.getElementById("editGive").checked;
    item.trash = document.getElementById("editTrash").checked;
    saveData();
    closeModal();
    refreshUI();
}

function closeModal() {
    document.getElementById("editModal").classList.remove("open");
    editingItem = null;
}

// Modal close on background click
document.getElementById("editModal").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) closeModal();
});

// Edit modal tag toggles
document.querySelectorAll("#editTags .tag-option").forEach(el => {
    el.addEventListener("click", () => {
        const tag = el.dataset.tag;
        const cb = el.querySelector("input");
        setTimeout(() => {
            el.classList.toggle("selected-" + tag, cb.checked);
        }, 0);
    });
});

// ==================== UTILITIES ====================
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, "-"); }
function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, "&quot;"); }

// ==================== EXPORT / RESET ====================
window.exportData = function() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "moving-checklist-backup.json"; a.click();
};
window.resetData = function() {
    if (confirm("Reset ALL data to original spreadsheet?")) {
        localStorage.removeItem("movingChecklist");
        for (const room of ROOMS) { data[room] = DEFAULT_DATA[room] ? DEFAULT_DATA[room].map(i => ({...i})) : []; }
        saveData(true);
        refreshUI();
        showToast("Data reset to defaults");
    }
};

// ==================== INIT ====================
loadData();
refreshUI();
setupFilters();
initFirebase();
</script>
