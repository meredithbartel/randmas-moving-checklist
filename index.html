<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Moving Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --green: #22c55e;
            --green-bg: #f0fdf4;
            --orange: #f59e0b;
            --orange-bg: #fffbeb;
            --red: #ef4444;
            --red-bg: #fef2f2;
            --purple: #a855f7;
            --purple-bg: #faf5ff;
            --gray: #94a3b8;
            --blue: #3b82f6;
            --blue-bg: #eff6ff;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--text); color: white;
            padding: 12px 20px; border-radius: var(--radius);
            font-size: 0.875rem; font-weight: 500; z-index: 1000;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Header */
        header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            color: white; padding: 28px 20px 20px;
            position: relative; overflow: hidden;
        }
        header::before {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 300px; height: 300px;
            background: rgba(255,255,255,0.08); border-radius: 50%;
        }
        .header-content { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
        header p { font-size: 0.95rem; opacity: 0.85; margin-top: 4px; }
        .sync-status {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px; padding: 4px 12px;
            background: rgba(255,255,255,0.15); border-radius: 20px;
            font-size: 0.8rem; backdrop-filter: blur(4px);
        }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
        .sync-dot.offline { background: #fbbf24; }
        .sync-dot.error { background: #f87171; }

        /* Top-level page tabs */
        .page-tabs {
            max-width: 900px; margin: 0 auto;
            display: flex; gap: 0; background: var(--card);
            border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }
        .page-tab {
            flex: 1; padding: 14px 8px; text-align: center;
            font-size: 0.85rem; font-weight: 600; font-family: inherit;
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); transition: all 0.15s;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .page-tab:hover { color: var(--primary); background: var(--primary-bg); }
        .page-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .page-tab .tab-icon { display: block; font-size: 1.2rem; margin-bottom: 2px; }

        .page-view { display: none; max-width: 900px; margin: 0 auto; padding: 0 16px; }
        .page-view.active { display: block; }

        /* ========== ROOMS PAGE ========== */
        .progress-section { padding: 16px 0 0; }
        .progress-card {
            background: var(--card); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--shadow-md);
        }
        .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .progress-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .progress-pct { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.5s; }
        .progress-stats { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
        .mini-stat { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); }
        .mini-stat-icon { width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }

        .room-nav { padding: 16px 0 0; }
        .room-pills { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
        .room-pills::-webkit-scrollbar { display: none; }
        .room-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; background: var(--card); border: 2px solid var(--border);
            border-radius: 100px; cursor: pointer; font-size: 0.875rem;
            font-family: inherit; font-weight: 500; color: var(--text-secondary);
            white-space: nowrap; transition: all 0.2s; box-shadow: var(--shadow);
        }
        .room-pill:hover { border-color: var(--primary-light); color: var(--primary); }
        .room-pill.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
        .pill-count { font-size: 0.75rem; padding: 1px 7px; border-radius: 10px; background: rgba(0,0,0,0.08); font-weight: 600; }
        .room-pill.active .pill-count { background: rgba(255,255,255,0.25); }

        .filter-section { padding: 0 0 8px; }
        .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filter-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; margin-right: 4px; }
        .filter-chip {
            padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--card); cursor: pointer; font-size: 0.78rem;
            font-family: inherit; font-weight: 500; color: var(--text-secondary); transition: all 0.15s;
        }
        .filter-chip:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-chip.active { background: var(--primary-bg); border-color: var(--primary); color: var(--primary); }

        .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .room-title { font-size: 1.25rem; font-weight: 700; }
        .room-count { font-size: 0.85rem; color: var(--text-secondary); }

        .checklist { list-style: none; }
        .checklist-item {
            display: flex; align-items: flex-start; gap: 12px; padding: 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 8px; transition: all 0.2s;
        }
        .checklist-item:hover { box-shadow: var(--shadow-md); border-color: #cbd5e1; }
        .checklist-item.done { background: #f8fafc; border-color: #e2e8f0; }
        .checklist-item.done .item-text { opacity: 0.5; }
        .checklist-item.done .item-name { text-decoration: line-through; color: var(--text-secondary); }

        .custom-check {
            width: 22px; height: 22px; min-width: 22px;
            border: 2px solid #cbd5e1; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; margin-top: 1px;
        }
        .custom-check:hover { border-color: var(--primary); }
        .custom-check.checked { background: var(--green); border-color: var(--green); }
        .custom-check.checked::after {
            content: ''; width: 6px; height: 10px;
            border: solid white; border-width: 0 2px 2px 0;
            transform: rotate(45deg) translateY(-1px);
        }

        .item-body { flex: 1; min-width: 0; }
        .item-name { font-size: 0.95rem; font-weight: 500; word-break: break-word; }
        .item-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center; }
        .item-notes { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; font-style: italic; }

        .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 10px; border-radius: 6px; font-size: 0.72rem;
            font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
        }
        .tag-who { background: var(--blue-bg); color: var(--blue); }
        .tag-garage { background: var(--orange-bg); color: #d97706; }
        .tag-sell { background: var(--red-bg); color: var(--red); }
        .tag-give { background: var(--purple-bg); color: var(--purple); }
        .tag-trash { background: #f1f5f9; color: #475569; }
        .tag-date { background: var(--primary-bg); color: var(--primary); }
        .tag-overdue { background: var(--red-bg); color: var(--red); }

        .item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
        .checklist-item:hover .item-actions { opacity: 1; }
        .action-btn {
            width: 32px; height: 32px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--card); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: var(--text-secondary); transition: all 0.15s;
        }
        .action-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .action-btn.delete:hover { background: var(--red-bg); border-color: #fecaca; color: var(--red); }

        .add-section { margin-top: 16px; }
        .add-toggle {
            display: flex; align-items: center; gap: 8px; padding: 14px 18px;
            background: var(--card); border: 2px dashed var(--border);
            border-radius: var(--radius); cursor: pointer; font-size: 0.9rem;
            font-family: inherit; font-weight: 500; color: var(--text-secondary);
            width: 100%; transition: all 0.2s;
        }
        .add-toggle:hover { border-color: var(--primary-light); color: var(--primary); background: var(--primary-bg); }
        .plus-icon {
            width: 24px; height: 24px; border-radius: 8px;
            background: var(--primary-bg); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 600;
        }

        .add-form {
            display: none; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-md);
            animation: slideDown 0.2s ease;
        }
        .add-form.open { display: block; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .form-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-grid .full-width { grid-column: 1 / -1; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label {
            font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-group input[type="text"],
        .input-group input[type="date"],
        .input-group input[type="number"],
        .input-group select {
            padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.9rem; font-family: inherit; background: var(--bg);
            color: var(--text); transition: all 0.15s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: var(--card);
        }

        .tag-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .tag-option {
            display: flex; align-items: center; gap: 6px; padding: 6px 14px;
            border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
            font-size: 0.82rem; font-weight: 500; color: var(--text-secondary);
            transition: all 0.15s; user-select: none;
        }
        .tag-option:hover { border-color: #cbd5e1; }
        .tag-option input { display: none; }
        .tag-option.selected-garage { background: var(--orange-bg); border-color: #fcd34d; color: #d97706; }
        .tag-option.selected-sell { background: var(--red-bg); border-color: #fca5a5; color: var(--red); }
        .tag-option.selected-give { background: var(--purple-bg); border-color: #d8b4fe; color: var(--purple); }
        .tag-option.selected-trash { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }

        .form-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 0.875rem; font-family: inherit; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary { background: #f1f5f9; color: var(--text-secondary); }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: var(--red); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
            z-index: 999; justify-content: center; align-items: flex-end; padding: 16px;
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--card); border-radius: 20px 20px 16px 16px;
            padding: 24px; width: 100%; max-width: 500px;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; }

        /* ========== TIMELINE PAGE ========== */
        .timeline-section { padding: 16px 0; }
        .timeline-group { margin-bottom: 24px; }
        .timeline-date-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
        }
        .timeline-date-label {
            font-size: 0.95rem; font-weight: 700; color: var(--text);
        }
        .timeline-date-badge {
            font-size: 0.72rem; font-weight: 600; padding: 2px 10px;
            border-radius: 6px; text-transform: uppercase;
        }
        .badge-overdue { background: var(--red-bg); color: var(--red); }
        .badge-today { background: var(--green-bg); color: var(--green); }
        .badge-upcoming { background: var(--blue-bg); color: var(--blue); }
        .badge-nodate { background: #f1f5f9; color: var(--text-secondary); }

        .timeline-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: var(--card);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 6px; transition: all 0.2s;
        }
        .timeline-item:hover { box-shadow: var(--shadow-md); }
        .timeline-item.done { opacity: 0.5; }
        .timeline-item.done .tl-name { text-decoration: line-through; }
        .tl-body { flex: 1; min-width: 0; }
        .tl-name { font-size: 0.9rem; font-weight: 500; }
        .tl-detail { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }

        /* ========== BUDGET PAGE ========== */
        .budget-section { padding: 16px 0; }

        .budget-summary {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow);
        }
        .summary-card-label {
            font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 4px;
        }
        .summary-card-value { font-size: 1.5rem; font-weight: 700; }
        .summary-card-value.green { color: var(--green); }
        .summary-card-value.red { color: var(--red); }
        .summary-card-value.blue { color: var(--blue); }
        .summary-card-value.purple { color: var(--purple); }

        .budget-category { margin-bottom: 28px; }
        .budget-cat-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
        }
        .budget-cat-title { font-size: 1.05rem; font-weight: 700; }
        .budget-cat-total { font-size: 1rem; font-weight: 700; color: var(--primary); }

        .expense-list { list-style: none; }
        .expense-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 6px;
        }
        .expense-item:hover { box-shadow: var(--shadow-md); }
        .exp-body { flex: 1; }
        .exp-name { font-size: 0.9rem; font-weight: 500; }
        .exp-detail { font-size: 0.78rem; color: var(--text-secondary); }
        .exp-amount { font-size: 1rem; font-weight: 700; white-space: nowrap; }
        .exp-amount.income { color: var(--green); }
        .exp-amount.expense { color: var(--red); }
        .exp-paid {
            font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
            border-radius: 6px; text-transform: uppercase;
        }
        .exp-paid.yes { background: var(--green-bg); color: var(--green); }
        .exp-paid.no { background: var(--orange-bg); color: #d97706; }

        /* Responsive */
        @media (min-width: 640px) {
            .modal-overlay { align-items: center; }
            .modal { border-radius: 20px; }
        }
        @media (max-width: 480px) {
            header { padding: 20px 16px 16px; }
            header h1 { font-size: 1.4rem; }
            .progress-card { padding: 16px; }
            .progress-pct { font-size: 1.25rem; }
            .form-grid { grid-template-columns: 1fr; }
            .checklist-item { padding: 12px; }
            .item-actions { opacity: 1; }
            .room-pill { padding: 7px 12px; font-size: 0.8rem; }
            .page-tab { padding: 10px 4px; font-size: 0.78rem; }
            .budget-summary { grid-template-columns: 1fr 1fr; }
        }
        @media print {
            header, .page-tabs, .add-section, .item-actions, .sync-status, .filter-section { display: none !important; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
    <div class="header-content">
        <h1>Mom's Moving Checklist</h1>
        <p>Room by room &mdash; everyone stays in sync</p>
        <div class="sync-status">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Checking connection...</span>
        </div>
    </div>
</header>

<!-- Page Navigation -->
<div class="page-tabs" id="pageTabs">
    <button class="page-tab active" data-page="rooms">
        <span class="tab-icon">&#127968;</span> Rooms
    </button>
    <button class="page-tab" data-page="timeline">
        <span class="tab-icon">&#128197;</span> Timeline
    </button>
    <button class="page-tab" data-page="budget">
        <span class="tab-icon">&#128176;</span> Budget
    </button>
</div>

<!-- ==================== ROOMS PAGE ==================== -->
<div class="page-view active" id="page-rooms">
    <div class="progress-section">
        <div class="progress-card">
            <div class="progress-header">
                <span class="progress-title">Overall Progress</span>
                <span class="progress-pct" id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-stats" id="progressStats"></div>
        </div>
    </div>
    <div class="room-nav">
        <div class="room-pills" id="roomPills"></div>
    </div>
    <div class="filter-section">
        <div class="filter-row">
            <span class="filter-label">Filter:</span>
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="pending">To Do</button>
            <button class="filter-chip" data-filter="done">Done</button>
            <button class="filter-chip" data-filter="garage">Garage</button>
            <button class="filter-chip" data-filter="sell">Sell</button>
            <button class="filter-chip" data-filter="give">Give Away</button>
            <button class="filter-chip" data-filter="trash">Trash</button>
            <button class="filter-chip" data-filter="unassigned">No One Assigned</button>
        </div>
    </div>
    <div id="mainContent"></div>
</div>

<!-- ==================== TIMELINE PAGE ==================== -->
<div class="page-view" id="page-timeline">
    <div class="timeline-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="font-size:1.25rem;font-weight:700;">Moving Timeline</h2>
            <button class="btn btn-primary btn-sm" onclick="openTimelineModal()">+ Add Task</button>
        </div>
        <div id="timelineContent"></div>
    </div>
</div>

<!-- ==================== BUDGET PAGE ==================== -->
<div class="page-view" id="page-budget">
    <div class="budget-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="font-size:1.25rem;font-weight:700;">Moving Budget</h2>
            <button class="btn btn-primary btn-sm" onclick="openExpenseModal()">+ Add Expense</button>

// ==================== FIREBASE ====================
function initFirebase() {
    if (!USE_FIREBASE) { setSyncStatus("offline","Local only (no Firebase)"); return; }
    try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
        db.ref(".info/connected").on("value", snap => {
            setSyncStatus(snap.val() ? "online" : "offline",
                snap.val() ? "Synced in real-time" : "Offline - saved locally");
        });
        // Listen to all data
        db.ref("app").on("value", snapshot => {
            const val = snapshot.val();
            if (!val) return;
            if (val.checklist) {
                data = {};
                for (const room of ROOMS) data[room] = val.checklist[room] ? Object.values(val.checklist[room]) : [];
            }
            if (val.timeline) timeline = Object.values(val.timeline);
            if (val.expenses) expenses = Object.values(val.expenses);
            localStorage.setItem("appData", JSON.stringify({ checklist: data, timeline, expenses }));
            fullRefresh();
        });
    } catch (e) {
        console.error("Firebase init failed:", e);
        setSyncStatus("error","Sync error - using local data");
    }
}

function setSyncStatus(s, t) {
    document.getElementById("syncDot").className = "sync-dot " + s;
    document.getElementById("syncText").textContent = t;
}

// ==================== DATA LAYER ====================
function loadAll() {
    const saved = localStorage.getItem("appData");
    if (saved) {
        const parsed = JSON.parse(saved);
        data = parsed.checklist || {};
        timeline = parsed.timeline || [];
        expenses = parsed.expenses || [];
        for (const room of ROOMS) { if (!data[room]) data[room] = []; }
    } else {
        for (const room of ROOMS) data[room] = DEFAULT_DATA[room] ? DEFAULT_DATA[room].map(i=>({...i})) : [];
        timeline = DEFAULT_TIMELINE.map(i=>({...i}));
        expenses = DEFAULT_EXPENSES.map(i=>({...i}));
        saveAll(true);
    }
}

function saveAll(quiet) {
    localStorage.setItem("appData", JSON.stringify({ checklist: data, timeline, expenses }));
    if (USE_FIREBASE && db) {
        db.ref("app").set({ checklist: data, timeline, expenses });
    }
    if (!quiet) showToast("Changes saved");
}

// ==================== TIMELINE RENDERING ====================
function renderTimeline() {
    const c = document.getElementById("timelineContent");
    if (timeline.length === 0) {
        c.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128197;</div><p>No tasks yet. Add your first moving task!</p></div>`;
        return;
    }
    const today = new Date().toISOString().split("T")[0];
    const groups = { overdue: [], today: [], upcoming: [], nodate: [] };

    timeline.forEach((t, i) => {
        const entry = { ...t, _idx: i };
        if (!t.date) groups.nodate.push(entry);
        else if (t.date < today && !t.done) groups.overdue.push(entry);
        else if (t.date === today) groups.today.push(entry);
        else groups.upcoming.push(entry);
    });

    // Sort dated groups
    groups.overdue.sort((a,b) => a.date.localeCompare(b.date));
    groups.upcoming.sort((a,b) => a.date.localeCompare(b.date));

    let html = "";
    const renderGroup = (label, badge, items) => {
        if (items.length === 0) return "";
        let h = `<div class="timeline-group">
            <div class="timeline-date-header">
                <span class="timeline-date-label">${label}</span>
                <span class="timeline-date-badge ${badge}">${items.length} task${items.length!==1?'s':''}</span>
            </div>`;
        for (const t of items) {
            const dateStr = t.date ? formatDate(t.date) : "";
            h += `<div class="timeline-item ${t.done?'done':''}">
                <div class="custom-check ${t.done?'checked':''}" onclick="toggleTimelineDone(${t._idx})"></div>
                <div class="tl-body">
                    <div class="tl-name">${esc(t.name)}</div>
                    <div class="tl-detail">
                        ${t.who?`<span class="tag tag-who">${esc(t.who)}</span> `:''}
                        ${dateStr?`<span class="tag tag-date">${dateStr}</span> `:''}
                        ${t.notes?esc(t.notes):''}
                    </div>
                </div>
                <div class="item-actions" style="opacity:1">
                    <button class="action-btn" onclick="openTimelineEdit(${t._idx})" title="Edit">&#9998;</button>
                    <button class="action-btn delete" onclick="deleteTimelineItem(${t._idx})" title="Remove">&times;</button>
                </div>
            </div>`;
        }
        h += `</div>`;
        return h;
    };

    html += renderGroup("Overdue", "badge-overdue", groups.overdue);
    html += renderGroup("Today", "badge-today", groups.today);
    html += renderGroup("Upcoming", "badge-upcoming", groups.upcoming);
    html += renderGroup("No Date Set", "badge-nodate", groups.nodate);

    c.innerHTML = html;
}

// ==================== BUDGET RENDERING ====================
function renderBudget() {
    // Summary
    let totalExpenses = 0, totalIncome = 0, totalPaid = 0, totalUnpaid = 0;
    for (const e of expenses) {
        const amt = parseFloat(e.amount) || 0;
        if (e.category === "Income") {
            totalIncome += amt;
        } else {
            totalExpenses += amt;
            if (e.paid === "yes") totalPaid += amt;
            else totalUnpaid += amt;
        }
    }

    document.getElementById("budgetSummary").innerHTML = `
        <div class="summary-card">
            <div class="summary-card-label">Total Expenses</div>
            <div class="summary-card-value red">$${totalExpenses.toFixed(2)}</div>
        </div>
        <div class="summary-card">
            <div class="summary-card-label">Income (Sold Items)</div>
            <div class="summary-card-value green">$${totalIncome.toFixed(2)}</div>
        </div>
        <div class="summary-card">
            <div class="summary-card-label">Net Cost</div>
            <div class="summary-card-value ${(totalExpenses-totalIncome)>0?'red':'green'}">$${(totalExpenses-totalIncome).toFixed(2)}</div>
        </div>
        <div class="summary-card">
            <div class="summary-card-label">Still Owed</div>
            <div class="summary-card-value ${totalUnpaid>0?'red':'green'}">$${totalUnpaid.toFixed(2)}</div>
        </div>`;

    // Group by category
    const cats = {};
    expenses.forEach((e, i) => {
        if (!cats[e.category]) cats[e.category] = [];
        cats[e.category].push({ ...e, _idx: i });
    });

    const catOrder = ["Moving Costs","Supplies","Repairs","Utilities","Monthly Bills","Income","Other"];
    const bc = document.getElementById("budgetContent");
    let html = "";

    for (const cat of catOrder) {
        const items = cats[cat];
        if (!items || items.length === 0) continue;
        const catTotal = items.reduce((s, e) => s + (parseFloat(e.amount)||0), 0);

        html += `<div class="budget-category">
            <div class="budget-cat-header">
                <span class="budget-cat-title">${esc(cat)}</span>
                <span class="budget-cat-total">$${catTotal.toFixed(2)}</span>
            </div>
            <ul class="expense-list">`;

        for (const e of items) {
            const amt = parseFloat(e.amount)||0;
            const isIncome = e.category === "Income";
            html += `<li class="expense-item">
                <div class="exp-body">
                    <div class="exp-name">${esc(e.name)}</div>
                    <div class="exp-detail">
                        ${e.date?formatDate(e.date)+' &middot; ':''}
                        ${e.notes?esc(e.notes):''}
                    </div>
                </div>
                <span class="exp-paid ${e.paid==='yes'?'yes':'no'}">${e.paid==='yes'?'Paid':'Unpaid'}</span>
                <span class="exp-amount ${isIncome?'income':'expense'}">${isIncome?'+':'-'}$${amt.toFixed(2)}</span>
                <div class="item-actions" style="opacity:1">
                    <button class="action-btn" onclick="openExpenseEdit(${e._idx})" title="Edit">&#9998;</button>
                    <button class="action-btn delete" onclick="deleteExpense(${e._idx})" title="Remove">&times;</button>
                </div>
            </li>`;
        }
        html += `</ul></div>`;
    }

    if (expenses.length === 0) {
        html = `<div class="empty-state"><div class="empty-icon">&#128176;</div><p>No expenses yet. Start tracking your moving costs!</p></div>`;
    }

    bc.innerHTML = html;
}

// ==================== ACTIONS: ROOMS ====================
function matchesFilter(item) {
    switch(activeFilter) {
        case "all":return true; case "pending":return !item.done; case "done":return item.done;
        case "garage":return item.garage; case "sell":return item.sell;
        case "give":return item.give; case "trash":return item.trash;
        case "unassigned":return !item.who; default:return true;
    }
}
function setupFilters() {
    document.querySelectorAll(".filter-chip").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active"); activeFilter=btn.dataset.filter; renderMainContent();
        };
    });
}
function toggleDone(room, i) { data[room][i].done=!data[room][i].done; saveAll(); fullRefresh(); }
function toggleAddForm(rid) {
    const form=document.getElementById("addForm-"+rid), toggle=document.getElementById("addToggle-"+rid);
    const open=form.classList.contains("open"); form.classList.toggle("open");
    toggle.style.display=open?"":"none";
    if(!open){ const n=document.getElementById("addName-"+rid); if(n)n.focus(); }
}
function toggleTag(el) {
    const cb=el.querySelector("input"), tag=el.dataset.tag;
    setTimeout(()=>{ el.classList.toggle("selected-"+tag, cb.checked); },0);
}
function addItem(room) {
    const rid=slugify(room), nameEl=document.getElementById("addName-"+rid);
    const name=nameEl.value.trim(); if(!name){nameEl.focus();return;}
    data[room].push({
        name, who:document.getElementById("addWho-"+rid).value.trim(),
        garage:document.getElementById("addGarage-"+rid).checked,
        sell:document.getElementById("addSell-"+rid).checked,
        give:document.getElementById("addGive-"+rid).checked,
        trash:document.getElementById("addTrash-"+rid).checked,
        done:false, notes:document.getElementById("addNotes-"+rid).value.trim(),
    });
    saveAll(); fullRefresh();
}
function deleteItem(room,i) { if(!confirm(`Remove "${data[room][i].name}"?`))return; data[room].splice(i,1); saveAll(); fullRefresh(); }
function openEdit(room,i) {
    editingItem={room,index:i}; const item=data[room][i];
    document.getElementById("editName").value=item.name;
    document.getElementById("editWho").value=item.who||"";
    document.getElementById("editNotes").value=item.notes||"";
    document.getElementById("editGarage").checked=item.garage;
    document.getElementById("editSell").checked=item.sell;
    document.getElementById("editGive").checked=item.give;
    document.getElementById("editTrash").checked=item.trash;
    document.querySelectorAll("#editTags .tag-option").forEach(el=>{
        el.classList.toggle("selected-"+el.dataset.tag, el.querySelector("input").checked);
    });
    openModal("editModal");
}
function saveEdit() {
    if(!editingItem)return; const{room,index}=editingItem; const item=data[room][index];
    item.name=document.getElementById("editName").value.trim()||item.name;
    item.who=document.getElementById("editWho").value.trim();
    item.notes=document.getElementById("editNotes").value.trim();
    item.garage=document.getElementById("editGarage").checked;
    item.sell=document.getElementById("editSell").checked;
    item.give=document.getElementById("editGive").checked;
    item.trash=document.getElementById("editTrash").checked;
    saveAll(); closeModal("editModal"); editingItem=null; fullRefresh();
}

// ==================== ACTIONS: TIMELINE ====================
function openTimelineModal() { editingTlIdx=null; document.getElementById("timelineModalTitle").textContent="Add Task";
    document.getElementById("tlName").value=""; document.getElementById("tlDate").value="";
    document.getElementById("tlWho").value=""; document.getElementById("tlNotes").value="";
    openModal("timelineModal");
}
function openTimelineEdit(i) { editingTlIdx=i; const t=timeline[i];
    document.getElementById("timelineModalTitle").textContent="Edit Task";
    document.getElementById("tlName").value=t.name;
    document.getElementById("tlDate").value=t.date||"";
    document.getElementById("tlWho").value=t.who||"";
    document.getElementById("tlNotes").value=t.notes||"";
    openModal("timelineModal");
}
function saveTimelineItem() {
    const name=document.getElementById("tlName").value.trim(); if(!name)return;
    const item = {
        name, date:document.getElementById("tlDate").value,
        who:document.getElementById("tlWho").value.trim(),
        notes:document.getElementById("tlNotes").value.trim(),
        done: editingTlIdx!==null ? timeline[editingTlIdx].done : false
    };
    if (editingTlIdx!==null) timeline[editingTlIdx]=item;
    else timeline.push(item);
    editingTlIdx=null; saveAll(); closeModal("timelineModal"); fullRefresh();
}
function toggleTimelineDone(i) { timeline[i].done=!timeline[i].done; saveAll(); fullRefresh(); }
function deleteTimelineItem(i) { if(!confirm(`Remove "${timeline[i].name}"?`))return; timeline.splice(i,1); saveAll(); fullRefresh(); }

// ==================== ACTIONS: BUDGET ====================
function openExpenseModal() { editingExpIdx=null; document.getElementById("expenseModalTitle").textContent="Add Expense";
    document.getElementById("expName").value=""; document.getElementById("expAmount").value="";
    document.getElementById("expCategory").value="Moving Costs"; document.getElementById("expDate").value="";
    document.getElementById("expPaid").value="no"; document.getElementById("expNotes").value="";
    openModal("expenseModal");
}
function openExpenseEdit(i) { editingExpIdx=i; const e=expenses[i];
    document.getElementById("expenseModalTitle").textContent="Edit Expense";
    document.getElementById("expName").value=e.name;
    document.getElementById("expAmount").value=e.amount||"";
    document.getElementById("expCategory").value=e.category;
    document.getElementById("expDate").value=e.date||"";
    document.getElementById("expPaid").value=e.paid||"no";
    document.getElementById("expNotes").value=e.notes||"";
    openModal("expenseModal");
}
function saveExpense() {
    const name=document.getElementById("expName").value.trim(); if(!name)return;
    const item = {
        name, amount:parseFloat(document.getElementById("expAmount").value)||0,
        category:document.getElementById("expCategory").value,
        date:document.getElementById("expDate").value,
        paid:document.getElementById("expPaid").value,
        notes:document.getElementById("expNotes").value.trim(),
    };
    if (editingExpIdx!==null) expenses[editingExpIdx]=item;
    else expenses.push(item);
    editingExpIdx=null; saveAll(); closeModal("expenseModal"); fullRefresh();
}
function deleteExpense(i) { if(!confirm(`Remove "${expenses[i].name}"?`))return; expenses.splice(i,1); saveAll(); fullRefresh(); }

// ==================== MODALS ====================
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); editingItem=null; editingTlIdx=null; editingExpIdx=null; }

// Close modals on background click
document.querySelectorAll(".modal-overlay").forEach(m => {
    m.addEventListener("click", e => { if(e.target===e.currentTarget) closeModal(m.id); });
});

// Edit modal tag toggles
document.querySelectorAll("#editTags .tag-option").forEach(el => {
    el.addEventListener("click", () => {
        setTimeout(() => { el.classList.toggle("selected-"+el.dataset.tag, el.querySelector("input").checked); }, 0);
    });
});

// ==================== UTILITIES ====================
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,"-"); }
function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,"&quot;"); }
function formatDate(d) {
    if(!d) return "";
    const parts = d.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[parseInt(parts[1])-1] + " " + parseInt(parts[2]) + ", " + parts[0];
}

function fullRefresh() {
    if (activePage === "rooms") { renderRoomPills(); renderMainContent(); updateProgress(); }
    else if (activePage === "timeline") { renderTimeline(); }
    else if (activePage === "budget") { renderBudget(); }
}

// ==================== EXPORT / RESET ====================
window.exportData = function() {
    const blob=new Blob([JSON.stringify({checklist:data,timeline,expenses},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="moving-checklist-backup.json"; a.click();
};
window.resetData = function() {
    if(confirm("Reset ALL data?")){
        localStorage.removeItem("appData");
        for(const room of ROOMS) data[room]=DEFAULT_DATA[room]?DEFAULT_DATA[room].map(i=>({...i})):[];
        timeline=DEFAULT_TIMELINE.map(i=>({...i})); expenses=DEFAULT_EXPENSES.map(i=>({...i}));
        saveAll(true); fullRefresh(); showToast("Data reset");
    }
};

// ==================== INIT ====================
loadAll();
setupPageTabs();
setupFilters();
fullRefresh();
initFirebase();
</script>
